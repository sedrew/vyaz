  <text x="0" y="18" font-family="Arial" font-size="20" fill="#000000" font-weight="700">
    <tspan x="0" font-weight="700" font-style="normal" font-family="Arial" font-size="20" fill="#000000">All Text Manipulations + Text Wrap (7 types, fixed) + Autofit +</tspan>
</text>
  <text x="0" y="42" font-family="Arial" font-size="20" fill="#000000" font-weight="700">
