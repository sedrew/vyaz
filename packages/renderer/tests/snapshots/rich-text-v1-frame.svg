</text>
  <text x="0" y="69" font-family="Arial" font-size="13.56" fill="#444444" font-weight="400">
    <tspan x="0" font-weight="400" font-style="normal" font-family="Arial" font-size="13.56" fill="#444444">Strict style: minimal colored borders, only black and gray outlines.</tspan>
</text>
  <text x="0" y="87" font-family="Arial" font-size="13.56" fill="#444444" font-weight="400">
    <tspan x="0" font-weight="400" font-style="normal" font-family="Arial" font-size="13.56" fill="#444444">Merged: fonts, sizes, effects, spacing, columns, drop caps, lists, text wrap (7 types), autofit (5</tspan>
</text>
  <text x="0" y="105" font-family="Arial" font-size="13.56" fill="#444444" font-weight="400">
    <tspan x="0" font-weight="400" font-style="normal" font-family="Arial" font-size="13.56" fill="#444444">types), world languages, vertical text.</tspan>
</text>
