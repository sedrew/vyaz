  <text x="24.67" y="1002" font-family="Arial" font-size="13" fill="#000" font-weight="400" xml:space="preserve"> The quick brown fox jumps over the lazy dog. Comfortable reading spacing.</text>
  <text x="0" y="1029" font-family="Arial" font-size="12" fill="#1e3a8a" font-weight="700" xml:space="preserve">[2.0]</text>
  <text x="24.67" y="1029" font-family="Arial" font-size="13" fill="#000" font-weight="400" xml:space="preserve"> The quick brown fox jumps over the lazy dog. Double spacing — easy for annotations.</text>
  <text x="0" y="1065" font-family="Arial" font-size="12" fill="#1e3a8a" font-weight="700" xml:space="preserve">[3.0]</text>
  <text x="24.67" y="1065" font-family="Arial" font-size="13" fill="#000" font-weight="400" xml:space="preserve"> The quick brown fox jumps over the lazy dog. Very loose spacing.</text>
