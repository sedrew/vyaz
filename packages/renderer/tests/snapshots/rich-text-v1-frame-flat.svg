  <text x="0" y="455" font-family="Arial" font-size="13.56" fill="#000000" font-weight="700" xml:space="preserve">4. Multilingual text</text>
  <text x="0" y="485" font-family="Arial" font-size="11" fill="#000" font-weight="700" xml:space="preserve">Русский</text>
  <text x="44.45" y="485" font-family="Arial" font-size="11" fill="#000" font-weight="400" xml:space="preserve">: Привет, мир! Это демонстрация поддержки кириллицы.</text>
  <text x="0" y="506" font-family="Arial" font-size="11" fill="#000" font-weight="700" xml:space="preserve">English</text>
  <text x="39.72" y="506" font-family="Arial" font-size="11" fill="#000" font-weight="400" xml:space="preserve">: This is an English text example. It shows Latin script with different styles.</text>
  <text x="0" y="527" font-family="Arial" font-size="11" fill="#000" font-weight="700" xml:space="preserve">中文</text>
  <text x="16.5" y="527" font-family="Arial" font-size="11" fill="#000" font-weight="400" xml:space="preserve">: 这是一个中文示例。本软件支持汉字。你好，世界！</text>
  <text x="0" y="548" font-family="Arial" font-size="11" fill="#000" font-weight="700" xml:space="preserve">العربية</text>
  <text x="24.22" y="548" font-family="Arial" font-size="11" fill="#000" font-weight="400" xml:space="preserve">: هذا نص عربي. اللغة العربية تكتب من اليمين إلى اليسار. مرحبا!</text>
  <text x="0" y="569" font-family="Arial" font-size="11" fill="#000" font-weight="700" xml:space="preserve">हिन्दी</text>
  <text x="49.5" y="569" font-family="Arial" font-size="11" fill="#000" font-weight="400" xml:space="preserve">: यह हिन्दी पाठ का उदाहरण है। नमस्ते!</text>
  <text x="0" y="590" font-family="Arial" font-size="11" fill="#000" font-weight="700" xml:space="preserve">Ελληνικά</text>
  <text x="48" y="590" font-family="Arial" font-size="11" fill="#000" font-weight="400" xml:space="preserve">: Αυτό είναι ένα παράδειγμα ελληνικής γλώσσας. Γειά σου Κόσμε!</text>
  <text x="0" y="611" font-family="Arial" font-size="11" fill="#000" font-weight="700" xml:space="preserve">Deutsch</text>
  <text x="43.4" y="611" font-family="Arial" font-size="11" fill="#000" font-weight="400" xml:space="preserve">: Dies ist ein deutscher Text. Zeigt Umlaute: ä, ö, ü.</text>
