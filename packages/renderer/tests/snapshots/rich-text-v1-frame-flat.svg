  <text x="534.74" y="702" font-family="Arial" font-size="16" fill="#1e3a8a" font-weight="700" font-style="italic" xml:space="preserve"> Balance</text>
  <text x="390.67" y="726" font-family="Arial" font-size="14" fill="#444" font-weight="400" xml:space="preserve">between form and function. (right)</text>
