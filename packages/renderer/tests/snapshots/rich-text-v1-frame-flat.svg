  <text x="0" y="962" font-family="Arial" font-size="12" fill="#1e3a8a" font-weight="700" xml:space="preserve">[1.0]</text>
  <text x="24.67" y="962" font-family="Arial" font-size="13" fill="#000" font-weight="400" xml:space="preserve"> The quick brown fox jumps over the lazy dog. Tight spacing with no extra leading.</text>
  <text x="0" y="981" font-family="Arial" font-size="12" fill="#1e3a8a" font-weight="700" xml:space="preserve">[1.15]</text>
  <text x="31.35" y="981" font-family="Arial" font-size="13" fill="#000" font-weight="400" xml:space="preserve"> The quick brown fox jumps over the lazy dog. Default line spacing in text layout.</text>
