  <text x="0" y="18" font-family="Arial" font-size="20" fill="#000000" font-weight="700" xml:space="preserve">All Text Manipulations + Text Wrap (7 types, fixed) + Autofit + </text>
  <text x="0" y="42" font-family="Arial" font-size="20" fill="#000000" font-weight="700" xml:space="preserve">Languages</text>
  <text x="0" y="69" font-family="Arial" font-size="13.56" fill="#444444" font-weight="400" xml:space="preserve">Strict style: minimal colored borders, only black and gray outlines.</text>
