  <text x="228.2" y="767" font-family="Arial" font-size="14" fill="#333" font-weight="400" xml:space="preserve"> is the art and technique of arranging type.</text>
  <text x="526.18" y="767" font-family="Arial" font-size="16" fill="#1e3a8a" font-weight="700" font-style="italic" xml:space="preserve"> Balance</text>
